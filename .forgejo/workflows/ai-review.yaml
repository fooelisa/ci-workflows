# Reusable Forgejo Actions workflow that reviews a pull request with Claude.
# Consumer repos add a 5-line caller in their own .forgejo/workflows/ai-review.yaml
# with `uses: fooelisa/ci-workflows/.forgejo/workflows/ai-review.yaml@main`
# and `secrets: inherit`.
#
# Two Forgejo secrets are required (org- or repo-level):
#   ANTHROPIC_API_KEY   from https://console.anthropic.com/settings/keys
#   REVIEWER_PAT        PAT for the `claude-reviewer` Forgejo user,
#                       scopes: read:repository + write:issue.
#                       Note: Forgejo reserves the FORGEJO_ prefix, so
#                       we can't call this FORGEJO_REVIEW_TOKEN.

on:
  workflow_call:

jobs:
  review:
    runs-on: ubuntu-latest
    container:
      # TODO(prompt-tuning): pin to a specific claude-action-runner SHA once
      # the prompt stabilizes. Rolling on :main during initial iteration.
      image: ghcr.io/fooelisa/claude-action-runner:main
      # Docker-level cgroup cap: keeps the review from pushing pik8s04
      # (Pi 4, 8Gi, shares the node with the monitoring stack).
      options: --memory=512m --cpus=0.5
    steps:
      - name: Run review
        run: /usr/local/bin/review.sh
        env:
          GITHUB_TOKEN:       ${{ secrets.REVIEWER_PAT }}
          ANTHROPIC_API_KEY:  ${{ secrets.ANTHROPIC_API_KEY }}
          PR_NUMBER:          ${{ github.event.pull_request.number }}
